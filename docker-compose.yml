services:
  db:
    image: postgres:15
    container_name: bidcompass_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: bidcompass
    ports:
      - '5434:5432'
    volumes:
      - bidcompass_pgdata:/var/lib/postgresql/data

volumes:
  bidcompass_pgdata:
    # 최초 실행 전: docker volume create bidcompass_pgdata
    external: true
