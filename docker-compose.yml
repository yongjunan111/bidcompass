services:
  db:
    image: postgres:15
    container_name: bidcompass_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: bidcompass
    ports:
      - '5434:5432'
    volumes:
      - bidcompass_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    container_name: bidcompass_web
    restart: unless-stopped
    ports:
      - '8010:8010'
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: '5432'
    volumes:
      - .:/app
      - ./data/collected:/app/data/collected
    depends_on:
      db:
        condition: service_healthy

  scheduler_announcements:
    build: .
    container_name: bidcompass_sched_announcements
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: '5432'
      SYNC_LOOKBACK_DAYS: '2'
      SYNC_INTERVAL_SECONDS: '86400'
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "/app/scripts/run_fetch_announcements.sh"]

  scheduler_results:
    build: .
    container_name: bidcompass_sched_results
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: '5432'
      SYNC_LOOKBACK_DAYS: '3'
      SYNC_INTERVAL_SECONDS: '86400'
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "/app/scripts/run_fetch_results.sh"]

  scheduler_api_data:
    build: .
    container_name: bidcompass_sched_api_data
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: '5432'
      API_DATA_LIMIT: '1000'
      API_DAILY_LIMIT: '900'
      API_SYNC_INTERVAL_SECONDS: '86400'
    volumes:
      - .:/app
      - ./data/collected:/app/data/collected
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "/app/scripts/run_collect_api_data.sh"]

volumes:
  bidcompass_pgdata:
    # 최초 실행 전: docker volume create bidcompass_pgdata
    external: true
